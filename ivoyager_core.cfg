; This file can be overridden by 'res://ivoyager_override.cfg'. The resulting
; configuration defines autoload singletons, shader globals, IVCoreSettings,
; IVCoreInitializer program classes, and ivoyager_assets version and source.
;
; See comments in res://addons/ivoyager_core/ivoyager_override_template.cfg.
;
; Paths can be absolute or relative to res://addons/ivoyager_core/editor/editor_plugin.gd.

[ivoyager_assets]

version="0.1"
source="https://github.com/ivoyager/asset_downloads/releases/download/v0.1/ivoyager_assets-v0.1.zip"
size_mib=216.0
disable_asset_loader=false

[core_autoload]

IVGlobal="../singletons/global.gd"
IVCoreSettings="../singletons/core_settings.gd"
IVCoreInitializer="../singletons/core_initializer.gd"
IVSettingsManager="../singletons/settings_manager.gd"
IVStateManager="../singletons/state_manager.gd"
IVAstronomy="../singletons/astronomy.gd"

[core_shader_globals]

iv_time={
"type": "float",
"value": 0.0
}
iv_mouse_fragcoord={
"type": "vec2",
"value": Vector2(0, 0)
}
iv_fragment_id_cycler={
"type": "float",
"value": 0.0
}
iv_fragment_id_range={
"type": "float",
"value": 0.0
}
